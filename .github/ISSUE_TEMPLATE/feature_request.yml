name: Feature request
description: Suggest an improvement or new feature
title: "[Feature] "
labels: ["Feature Request"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or missing capability.
      placeholder: I find it frustrating when...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should Moonfin handle this?
      placeholder: It would be great if...
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) does this apply to?
      multiple: true
      options:
        - Android
        - Android TV
        - iOS
        - tvOS
        - Web
        - macOS
        - Windows
        - Linux
        - Tizen
        - All / Not platform-specific
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought of.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, mockups, links, related issues, etc.
    validations:
      required: false
